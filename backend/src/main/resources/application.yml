server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: rrhh-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rrhh}
    username: ${SPRING_DATASOURCE_USERNAME:rrhh}
    password: ${SPRING_DATASOURCE_PASSWORD:rrhh123}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-with-at-least-thirty-two-chars}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
  seed:
    admin:
      full-name: ${APP_SEED_ADMIN_FULL_NAME:Administrador}
      email: ${APP_SEED_ADMIN_EMAIL:admin@grupomendoza.com}
      password: ${APP_SEED_ADMIN_PASSWORD:Admin12345!}
    admin-secondary:
      enabled: ${APP_SEED_ADMIN_SECONDARY_ENABLED:false}
      full-name: ${APP_SEED_ADMIN_SECONDARY_FULL_NAME:Administrador Secundario}
      email: ${APP_SEED_ADMIN_SECONDARY_EMAIL:admin2@grupomendoza.com}
      password: ${APP_SEED_ADMIN_SECONDARY_PASSWORD:Admin12345!}
    admin-third:
      enabled: ${APP_SEED_ADMIN_THIRD_ENABLED:true}
      remove-legacy-admin2: ${APP_SEED_ADMIN_THIRD_REMOVE_LEGACY_ADMIN2:true}
      full-name: ${APP_SEED_ADMIN_THIRD_FULL_NAME:Administrador 3}
      email: ${APP_SEED_ADMIN_THIRD_EMAIL:admin3@grupomendoza.com}
      password: ${APP_SEED_ADMIN_THIRD_PASSWORD:Admin12345!}
    users:
      hr-enabled: ${APP_SEED_HR_ENABLED:true}
      hr-full-name: ${APP_SEED_HR_FULL_NAME:Recursos Humanos Semilla}
      hr-email: ${APP_SEED_HR_EMAIL:hr.seed@grupomendoza.com}
      hr-password: ${APP_SEED_HR_PASSWORD:Seed12345!}
      manager-enabled: ${APP_SEED_MANAGER_ENABLED:true}
      manager-full-name: ${APP_SEED_MANAGER_FULL_NAME:Jefatura Semilla}
      manager-email: ${APP_SEED_MANAGER_EMAIL:manager.seed@grupomendoza.com}
      manager-password: ${APP_SEED_MANAGER_PASSWORD:Seed12345!}
      employee-enabled: ${APP_SEED_EMPLOYEE_ENABLED:true}
      employee-full-name: ${APP_SEED_EMPLOYEE_FULL_NAME:Colaborador Semilla}
      employee-email: ${APP_SEED_EMPLOYEE_EMAIL:empleado.seed@grupomendoza.com}
      employee-password: ${APP_SEED_EMPLOYEE_PASSWORD:Seed12345!}
    demo:
      enabled: ${APP_SEED_DEMO_ENABLED:false}
      default-password: ${APP_SEED_DEMO_DEFAULT_PASSWORD:Demo12345!}
    fixed-term-contracts:
      enabled: ${APP_SEED_FIXED_TERM_CONTRACTS_ENABLED:true}
      default-password: ${APP_SEED_FIXED_TERM_CONTRACTS_DEFAULT_PASSWORD:Trabajador123!}
