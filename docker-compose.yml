services:
  db:
    image: postgres:16-alpine
    container_name: rrhh-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rrhh}
      POSTGRES_USER: ${POSTGRES_USER:-rrhh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rrhh123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rrhh} -d ${POSTGRES_DB:-rrhh}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rrhh-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-rrhh}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-rrhh}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-rrhh123}
      APP_CORS_ALLOWED_ORIGIN: ${APP_CORS_ALLOWED_ORIGIN:-http://localhost:5173}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-key-with-at-least-thirty-two-chars}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_SEED_ADMIN_FULL_NAME: ${APP_SEED_ADMIN_FULL_NAME:-Administrador Sprint 0}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL:-admin@grupomendoza.com}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-Admin12345!}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rrhh-frontend
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME:-RRHH Grupo Mendoza}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  postgres_data:
